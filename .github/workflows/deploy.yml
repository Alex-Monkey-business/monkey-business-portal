name: Deploy to Netlify

on:
  push:
    branches: [main, "claude/**"]
  workflow_dispatch:

concurrency:
  group: deploy-netlify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Deploy to Netlify (production)
        if: github.ref == 'refs/heads/main'
        working-directory: web
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: >
          npx --yes netlify-cli@latest deploy
          --prod
          --dir=dist
          --message "${{ github.event.head_commit.message || github.sha }}"

      - name: Deploy to Netlify (preview)
        if: github.ref != 'refs/heads/main'
        working-directory: web
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          slug="${GITHUB_REF_NAME//\//-}"
          slug="${slug,,}"
          slug="${slug:0:37}"
          npx --yes netlify-cli@latest deploy \
            --dir=dist \
            --alias "$slug" \
            --message "preview: ${{ github.sha }}" \
            | tee /tmp/netlify-out.txt
          url=$(grep -Eo 'https://[a-z0-9.-]+\.netlify\.app[^[:space:]]*' /tmp/netlify-out.txt | head -1)
          echo "## Preview deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "$url" >> "$GITHUB_STEP_SUMMARY"
